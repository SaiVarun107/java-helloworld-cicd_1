apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-hello
  template:
    metadata:
      labels:
        app: java-hello
    spec:
      containers:
        - name: java-hello
          image: java-hello:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080